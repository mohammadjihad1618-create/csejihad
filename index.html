<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSE Jihad Cyber Security Academy</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#000814;
color:white;
text-align:center;
}

header{
padding:40px 20px;
background:#001d3d;
}

header img{
width:180px;
margin-bottom:15px;
}

h1{
color:#00c3ff;
}

section{
padding:40px 20px;
}

.card{
background:#111a2e;
padding:30px;
margin:20px auto;
width:90%;
max-width:600px;
border-radius:15px;
box-shadow:0 0 30px rgba(0,195,255,0.5);
}

input{
padding:12px;
width:80%;
margin:10px;
border:none;
border-radius:8px;
}

button{
padding:12px 25px;
background:#00c3ff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0077ff;
}
</style>

</head>

<body>

<header>
<img src="logo.png">
<h1>CSE Jihad Cyber Security Academy</h1>
<p>Learn Ethical Cyber Security Professionally</p>
</header>

<section>
<div class="card">
<h2>Sign Up Now</h2>
<input type="text" id="name" placeholder="Enter Your Name" required><br>
<input type="email" id="email" placeholder="Enter Your Email" required><br>
<button onclick="sendMail()">Join Academy</button>
</div>
</section>

<script>
(function(){
emailjs.init("YOUR_PUBLIC_KEY");
})();

function sendMail(){

var params = {
from_name: document.getElementById("name").value,
from_email: document.getElementById("email").value,
};

emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",params)
.then(function(res){
alert("User Joined Successfully! Email Notification Sent.");
})
.catch(function(error){
alert("Error sending email.");
});
}
</script>

</body>
</html>
